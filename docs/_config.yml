# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: LD-Archive.org
email: contact@ld-archive.org
description: >- # this means to ignore newlines until "baseurl:"
  LD-Archive.org is the home of archived content from The Lighting Design Archive,
  a project of the Royal Academy of Dramatic Art (RADA) in London. The Archive contains a 
  collection of lighting design materials submitted by lighting designers for live performance.
domain: ld-archive.org
baseurl: "" # served from the domain root (apex domain via CNAME). This is a URL path prefix, NOT the source folder — the /docs source folder is set in GitHub Pages settings.
url: "https://ld-archive.org" # the base hostname & protocol for your site, e.g. http://example.com
github_username:  ld-archive

# Build settings
remote_theme: mmistakes/minimal-mistakes@4.28.0
plugins:
  - jekyll-feed
  - jekyll-remote-theme
  - jekyll-include-cache

# Minimal Mistakes theme configuration
minimal_mistakes_skin: "default" # skin options: default, air, aqua, contrast, dark, dirt, neon, mint, plum, sunrise
locale: "en-GB"

# Site-wide author / organisation (shown in sidebars and footer)
author:
  name: "The Lighting Design Archive"
  bio: "A public archive of theatre lighting design materials, a project of RADA."
  links:
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "https://ld-archive.org"

# Client-side search over site content (Lunr, no server needed)
search: true
search_full_content: true
search_provider: lunr

# Default front matter applied to all pages so we don't repeat it everywhere
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
# exclude:
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/
